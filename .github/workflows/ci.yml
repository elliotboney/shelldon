name: CI
on:
  push:
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Enforce LLM-free core (AD-1)
        run: uv run lint-imports
      - name: Tests (M0 harness)
        run: uv run pytest
