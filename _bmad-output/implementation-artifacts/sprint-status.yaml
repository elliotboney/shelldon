  plugin-host-owns-the-read-loop: done  # 2026-06-19: RESOLVED by Story 7-2 AC1 — the host now owns the single read loop and fans out via loaded.subscriptions; Plugin.run(reader,writer) replaced by on_event(event). 7-1 review [Decision], owner chose defer-to-7.2 + doc-note. 7-1's run_plugin_host hands the SAME reader/writer to every plugin's run(); with ≥2 real plugins each calling read_frame the frames interleave/corrupt. Zero 7.1 impact (only the idle sentinel reads). Option A (per-plugin connect()) is a TRAP — all register as Actor.PLUGIN_HOST and clobber the hub's actor-keyed registry. FIX = Story 7.2 itself: the host owns the single read loop and fans out to subscribed plugins via loaded.subscriptions (1→N); a plugin never reads the socket. Doc-note already in run_plugin_host (SINGLE-READER LIMIT). MUST be addressed when 7.2 is built. Plus 7-1 deferred review items (10, all [x] in the story): _idle sentinel bypasses validate_claims; LoadedPlugins lacks __eq__/__repr__; emits field unused; tests touch srv._registry; connect() no retry/timeout; BasePlugin.run doesn't catch OSError; second exception in done discarded; iter_modules order fs-dependent; _plugin_host_proc doesn't pass env; namespace-package __path__ None — all pre-existing-pattern / low-urgency.
